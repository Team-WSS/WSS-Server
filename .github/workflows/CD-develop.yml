name: CD-develop

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy-ci-develop:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTION_TOKEN }}
          submodules: true
          fetch-depth: 0

      - name: Update Submodule
        run: git submodule update --init --recursive --remote

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build with Gradle
        env:
          DEV_DB_NAME: ${{ secrets.DEV_DB_NAME }}
          DEV_DB_PWD: ${{ secrets.DEV_DB_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_NAME: ${{ secrets.APPLE_KEY_NAME }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: ./gradlew build -x test -Dspring.profiles.active=dev
        shell: bash

      - name: Docker build Setting
        uses: docker/setup-buildx-action@v2.9.1

      - name: Docker hub Login
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}

      - name: Docker image Build and Push
        run: |
          docker build --platform linux/amd64 -t websoso/websoso-image .
          docker push websoso/websoso-image

  deploy-cd-develop:
    needs: deploy-ci-develop
    runs-on: ubuntu-22.04

    steps:
      - name: Run Docker container
        uses: appleboy/ssh-action@master
        env:
          DEV_DB_NAME: ${{ secrets.DEV_DB_NAME }}
          DEV_DB_PWD: ${{ secrets.DEV_DB_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_NAME: ${{ secrets.APPLE_KEY_NAME }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        with:
          host: ${{ secrets.DEVELOP_SERVER_IP }}
          username: ${{ secrets.DEVELOP_SERVER_USER }}
          key: ${{ secrets.DEVELOP_SERVER_KEY }}
          envs: DEV_DB_NAME,DEV_DB_PWD,APPLE_TEAM_ID,APPLE_KEY_NAME,S3_ACCESS_KEY,S3_SECRET_KEY
          script: |
            cd ~
            ./deploy.sh
